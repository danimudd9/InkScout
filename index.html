<!-- ===================== LANDING PAGE (index.html) ===================== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkScout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/logo.png">
</head>
<body>

<!-- NAVBAR -->
<header class="nav fade-down">
  <a href="index.html" class="logo">
    <img src="assets/logo.png" class="logo-img">
    <span>InkScout</span>
  </a>
  <nav>
    <a href="prelogin.html">Login</a>
    <a href="browse.html">Shop</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text fade-up">
    <h1>Find Your Perfect Tattoo Artist</h1>
    <p>Discover top-rated artists, explore styles, and book with confidence.</p>
    <div class="hero-buttons">
      <a href="browse.html">
        <button class="primary">Browse Artists</button>
      </a>
      <a href="works.html">
        <button class="secondary">How It Works</button>
      </a>
    </div>
    <div class="og-counter" id="ogCounter" style="display:none;">
      <span>🔥</span>
      <span id="ogCounterText"></span>
    </div>
  </div>
</section>

<script type="module">
  import { getOGSpotsLeft } from './og.js';
  getOGSpotsLeft().then(spots => {
    if (spots > 0) {
      document.getElementById('ogCounterText').textContent =
        `${spots} of 10 OG artist spots remaining — join now for free Pro, for life`;
      document.getElementById('ogCounter').style.display = 'flex';
    }
  });
</script>

<!-- HERO IMAGE -->
<section>
  <div class="homepic">
    <img src="assets/logo.png" alt="InkScout">
  </div>
</section>

<!-- TOP ARTISTS -->
<section>
  <div class="tatitle">
    <h2>Top Artists</h2>
  </div>
  <div class="fire">
    <p>Check out these 🔥 artists</p>
  </div>

  <!-- Real artists loaded from Firestore, sample shown as fallback -->
  <section class="artist-grid" id="topArtistsGrid">
    <!-- Populated by JS below -->
  </section>
</section>

<!-- FOOTER -->
<footer class="footer fade-in">
  <p>© 2026 InkScout. All rights reserved.</p>
</footer>

<script type="module">
  import { db } from './firebase.js';
  import { collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const SAMPLE_ARTISTS = [
    {
      uid: 'sample-1',
      name: 'Ava Black',
      style: 'Black & Grey',
      rating: 4.9,
      plan: 'pro',
      photo: 'https://lanzadera-digital.b-cdn.net/gangatattoolosangeles.com/Styles/Black%20%26%20Gray%20Realism/bg-image-1.webp'
    },
    {
      uid: 'sample-2',
      name: 'Rick Valor',
      style: 'Neo Traditional',
      rating: 4.8,
      plan: 'pro',
      photo: 'https://tattoolist.co/wp-content/uploads/2020/03/Cat-tattoo-819x1024.jpg'
    },
    {
      uid: 'sample-3',
      name: 'Maya Ink',
      style: 'Fine Line',
      rating: 5.0,
      plan: 'pro',
      photo: 'https://tattoogenda.com/wp-content/uploads/2022/12/291218935_590683715999700_619908202020858408_n.jpg'
    }
  ];

  async function loadTopArtists() {
    const grid = document.getElementById('topArtistsGrid');

    try {
      // Try to load real featured Pro artists from Firestore
      const q = query(
        collection(db, 'users'),
        where('role', '==', 'artist'),
        where('plan', '==', 'pro'),
        limit(6)
      );
      const snap = await getDocs(q);
      const realArtists = [];
      snap.forEach(d => realArtists.push({ uid: d.id, ...d.data() }));

      // Use real artists if any exist, otherwise fall back to samples
      const artists = realArtists.length > 0 ? realArtists : SAMPLE_ARTISTS;

      grid.innerHTML = artists.map(a => `
        <div class="artist-card">
          <div class="artist-img">
            <img src="${a.photo || 'https://images.unsplash.com/photo-1598371839696-5c5bb00bdc28?w=400&auto=format&fit=crop'}" alt="${a.name}">
            ${a.plan === 'pro' ? '<span class="artist-card-pro-badge">⚡ PRO</span>' : ''}
          </div>
          <div class="artist-info">
            <h3>${a.name}</h3>
            <p>${a.style || '—'}</p>
            <span class="rating">⭐ ${a.rating || 'New'}</span>
            <a href="profile.html?uid=${a.uid}" class="view-btn">View Profile</a>
          </div>
        </div>
      `).join('');

    } catch (err) {
      // Firestore unavailable — show samples
      grid.innerHTML = SAMPLE_ARTISTS.map(a => `
        <div class="artist-card">
          <div class="artist-img">
            <img src="${a.photo}" alt="${a.name}">
            <span class="artist-card-pro-badge">⚡ PRO</span>
          </div>
          <div class="artist-info">
            <h3>${a.name}</h3>
            <p>${a.style}</p>
            <span class="rating">⭐ ${a.rating}</span>
            <a href="profile.html?uid=${a.uid}" class="view-btn">View Profile</a>
          </div>
        </div>
      `).join('');
    }
  }

  loadTopArtists();
</script>

<script src="nav.js"></script>
</body>
</html>
