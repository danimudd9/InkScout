<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkScout</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Link to CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">

    <div class="logo">
      <img src="https://via.placeholder.com/50" class="logo-img">
      <h1>InkScout</h1>
    </div>

    <p class="tagline">Find Your Perfect Tattoo Artist</p>

    <button class="cta">Browse Artists</button>

    <div class="mockups">

      <div class="phone">
        <div class="phone-screen">
          <div class="artist-card">
            Micheal Schofield<br>
            <small>Black & Grey</small>
          </div>
          <div class="artist-card highlight">
            Edna Mode<br>
            <small>Neo Traditional</small>
          </div>
        </div>
      </div>

      <div class="desktop">
        <div class="nav">
          <span>InkScout</span>
          <span>Explore | Top Artists | Login</span>
        </div>

        <div class="search-bar">
          <input placeholder="Tattoo Style">
          <input placeholder="Location">
          <input placeholder="Min Rating">
          <button>Search</button>
        </div>

        <div class="artist-row">
          Micheal Schofield — Black & Grey
        </div>
        <div class="artist-row">
          Edna Mode — Neo Traditional
        </div>
      </div>

    </div>

  </div>
</body>
</html>
