<!-- admin-login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - InkScout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/logo.png">
</head>
<body>
  <header class="nav">
    <div class="logo"><img src="assets/logo.png" class="logo-img"><span>InkScout</span></div>
  </header>
  <section class="form-page fade-up">
    <div class="form-card">
      <div class="form-header">
        <span class="form-icon">⚡</span>
        <h1>Admin Login</h1>
        <p>InkScout administration panel.</p>
      </div>
      <form class="register-form" id="adminLoginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="adminEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="adminPassword" placeholder="Password" required>
        </div>
        <p class="form-error" id="adminError"></p>
        <button type="submit" class="primary form-submit" id="submitBtn">Login</button>
      </form>
    </div>
  </section>
  <script type="module">
    import { auth, db } from './firebase.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('adminError');
      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Logging in...';
      btn.disabled = true;
      try {
        const cred = await signInWithEmailAndPassword(auth,
          document.getElementById('adminEmail').value.trim(),
          document.getElementById('adminPassword').value);
        const userDoc = await getDoc(doc(db, 'users', cred.user.uid));
        if (userDoc.exists() && userDoc.data().role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        } else {
          await auth.signOut();
          errorEl.textContent = 'Not an admin account.';
          btn.textContent = 'Login'; btn.disabled = false;
        }
      } catch(err) {
        errorEl.textContent = 'Incorrect email or password.';
        btn.textContent = 'Login'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
