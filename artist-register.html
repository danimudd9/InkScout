<!-- ===================== artist-register.html ===================== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Register - InkScout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/logo.png">
</head>
<body>

  <header class="nav fade-down">
    <a href="index.html" class="logo">
      <img src="assets/logo.png" class="logo-img">
      <span>InkScout</span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="browse.html">Explore</a>
      <a href="prelogin.html">Login</a>
    </nav>
  </header>

  <section class="form-page fade-up">
    <div class="form-card">

      <div class="form-header">
        <span class="form-icon">🎨</span>
        <h1>Create Artist Account</h1>
        <p>Build your profile and start connecting with clients.</p>
      </div>

      <form class="register-form" id="artistRegisterForm">

        <div class="form-group">
          <label for="artistName">Full Name</label>
          <input type="text" id="artistName" placeholder="e.g. Jane Doe" required>
        </div>

        <div class="form-group">
          <label for="artistEmail">Email Address</label>
          <input type="email" id="artistEmail" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="artistPassword">Password</label>
          <input type="password" id="artistPassword" placeholder="Minimum 8 characters" minlength="8" required>
        </div>

        <div class="form-group">
          <label for="artistConfirm">Confirm Password</label>
          <input type="password" id="artistConfirm" placeholder="Re-enter your password" required>
        </div>

        <div class="form-group">
          <label for="artistLocation">State</label>
          <select id="artistLocation" required>
            <option value="" disabled selected>Select your state</option>
            <option>Alabama</option><option>Alaska</option><option>Arizona</option>
            <option>Arkansas</option><option>California</option><option>Colorado</option>
            <option>Connecticut</option><option>Delaware</option><option>Florida</option>
            <option>Georgia</option><option>Hawaii</option><option>Idaho</option>
            <option>Illinois</option><option>Indiana</option><option>Iowa</option>
            <option>Kansas</option><option>Kentucky</option><option>Louisiana</option>
            <option>Maine</option><option>Maryland</option><option>Massachusetts</option>
            <option>Michigan</option><option>Minnesota</option><option>Mississippi</option>
            <option>Missouri</option><option>Montana</option><option>Nebraska</option>
            <option>Nevada</option><option>New Hampshire</option><option>New Jersey</option>
            <option>New Mexico</option><option>New York</option><option>North Carolina</option>
            <option>North Dakota</option><option>Ohio</option><option>Oklahoma</option>
            <option>Oregon</option><option>Pennsylvania</option><option>Rhode Island</option>
            <option>South Carolina</option><option>South Dakota</option><option>Tennessee</option>
            <option>Texas</option><option>Utah</option><option>Vermont</option>
            <option>Virginia</option><option>Washington</option><option>West Virginia</option>
            <option>Wisconsin</option><option>Wyoming</option>
          </select>
        </div>

        <div class="form-group">
          <label for="artistStyle">Primary Style</label>
          <select id="artistStyle" required>
            <option value="" disabled selected>Select your style</option>
            <option>Black & Grey</option>
            <option>Neo Traditional</option>
            <option>Fine Line</option>
            <option>Japanese</option>
            <option>Realism</option>
            <option>Watercolor</option>
            <option>Geometric</option>
            <option>Tribal</option>
            <option>Illustrative</option>
            <option>Other</option>
          </select>
        </div>

        <p class="form-error" id="artistError"></p>

        <button type="submit" class="primary form-submit" id="submitBtn">
          Create Artist Account
        </button>

      </form>

      <p class="form-footer-text">
        Already have an account? <a href="prelogin.html">Log in here</a>
      </p>
      <p class="form-footer-text">
        Registering as a client? <a href="canvas-register.html">Canvas Sign Up</a>
      </p>

    </div>
  </section>

  <footer class="footer fade-in">
    <p>© 2026 InkScout. All rights reserved.</p>
  </footer>

  <script type="module">
    import { auth, db } from './firebase.js';
    import {
      createUserWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { claimOGSpot, getOGSpotsLeft } from './og.js';

    const form      = document.getElementById('artistRegisterForm');
    const errorMsg  = document.getElementById('artistError');
    const submitBtn = document.getElementById('submitBtn');

    // Show OG spots remaining on load
    getOGSpotsLeft().then(spots => {
      if (spots > 0) {
        const ogNotice = document.createElement('div');
        ogNotice.className = 'og-register-notice';
        ogNotice.innerHTML = `🔥 <strong>${spots} OG spot${spots !== 1 ? 's' : ''} remaining</strong> — first 10 artists get Pro free for life!`;
        form.parentElement.insertBefore(ogNotice, form);
      }
    });

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errorMsg.textContent = '';

      const name     = document.getElementById('artistName').value.trim();
      const email    = document.getElementById('artistEmail').value.trim();
      const password = document.getElementById('artistPassword').value;
      const confirm  = document.getElementById('artistConfirm').value;
      const location = document.getElementById('artistLocation').value;
      const style    = document.getElementById('artistStyle').value;

      if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match. Please try again.';
        return;
      }

      submitBtn.textContent = 'Creating account...';
      submitBtn.disabled = true;

      try {
        // 1. Create Firebase Auth account
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. Set display name
        await updateProfile(user, { displayName: name });

        // 3. Try to claim OG spot
        const og = await claimOGSpot(user.uid);

        // 4. Save to Firestore with OG/Pro status if claimed
        await setDoc(doc(db, 'users', user.uid), {
          uid:       user.uid,
          name:      name,
          email:     email,
          location:  location,
          style:     style,
          role:      'artist',
          plan:      og.plan,
          og:        og.og,
          ogSince:   og.ogSince || null,
          createdAt: new Date().toISOString()
        });

        // 5. Redirect — show OG welcome if claimed
        if (og.claimed) {
          window.location.href = 'artist-dashboard.html?og=1';
        } else {
          window.location.href = 'artist-dashboard.html';
        }

      } catch (err) {
        submitBtn.textContent = 'Create Artist Account';
        submitBtn.disabled = false;

        if (err.code === 'auth/email-already-in-use') {
          errorMsg.textContent = 'An account with this email already exists.';
        } else if (err.code === 'auth/weak-password') {
          errorMsg.textContent = 'Password must be at least 8 characters.';
        } else if (err.code === 'auth/invalid-email') {
          errorMsg.textContent = 'Please enter a valid email address.';
        } else {
          errorMsg.textContent = 'Something went wrong. Please try again.';
          console.error(err);
        }
      }
    });
  </script>

<script src="nav.js"></script>
</body>
</html>
