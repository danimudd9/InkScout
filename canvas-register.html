<!-- ===================== canvas-register.html ===================== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Register - InkScout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="nav fade-down">
    <div class="logo">
      <img src="assets/logo.png" class="logo-img">
      <span>InkScout</span>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="browse.html">Explore</a>
      <a href="prelogin.html">Login</a>
    </nav>
  </header>

  <section class="form-page fade-up">
    <div class="form-card">

      <div class="form-header">
        <span class="form-icon">🖋</span>
        <h1>Create Canvas Account</h1>
        <p>Discover artists, save inspiration, and book your next tattoo.</p>
      </div>

      <form class="register-form" id="canvasRegisterForm">

        <div class="form-group">
          <label for="canvasName">Full Name</label>
          <input type="text" id="canvasName" placeholder="e.g. Alex Smith" required>
        </div>

        <div class="form-group">
          <label for="canvasEmail">Email Address</label>
          <input type="email" id="canvasEmail" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="canvasPassword">Password</label>
          <input type="password" id="canvasPassword" placeholder="Minimum 8 characters" minlength="8" required>
        </div>

        <div class="form-group">
          <label for="canvasConfirm">Confirm Password</label>
          <input type="password" id="canvasConfirm" placeholder="Re-enter your password" required>
        </div>

        <p class="form-error" id="canvasError"></p>

        <button type="submit" class="primary form-submit" id="submitBtn">
          Create Canvas Account
        </button>

      </form>

      <p class="form-footer-text">
        Already have an account? <a href="prelogin.html">Log in here</a>
      </p>
      <p class="form-footer-text">
        Registering as an artist? <a href="artist-register.html">Artist Sign Up</a>
      </p>

    </div>
  </section>

  <footer class="footer fade-in">
    <p>© 2026 InkScout. All rights reserved.</p>
  </footer>

  <script type="module">
    import { auth, db } from './firebase.js';
    import {
      createUserWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const form      = document.getElementById('canvasRegisterForm');
    const errorMsg  = document.getElementById('canvasError');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errorMsg.textContent = '';

      const name     = document.getElementById('canvasName').value.trim();
      const email    = document.getElementById('canvasEmail').value.trim();
      const password = document.getElementById('canvasPassword').value;
      const confirm  = document.getElementById('canvasConfirm').value;

      if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match. Please try again.';
        return;
      }

      submitBtn.textContent = 'Creating account...';
      submitBtn.disabled = true;

      try {
        // 1. Create user in Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. Set display name
        await updateProfile(user, { displayName: name });

        // 3. Save canvas profile to Firestore
        await setDoc(doc(db, 'users', user.uid), {
          uid:       user.uid,
          name:      name,
          email:     email,
          role:      'canvas',
          savedArtists: [],
          createdAt: new Date().toISOString()
        });

        // 4. Redirect to canvas dashboard
        window.location.href = 'canvas-dashboard.html';

      } catch (err) {
        submitBtn.textContent = 'Create Canvas Account';
        submitBtn.disabled = false;

        if (err.code === 'auth/email-already-in-use') {
          errorMsg.textContent = 'An account with this email already exists.';
        } else if (err.code === 'auth/weak-password') {
          errorMsg.textContent = 'Password must be at least 8 characters.';
        } else if (err.code === 'auth/invalid-email') {
          errorMsg.textContent = 'Please enter a valid email address.';
        } else {
          errorMsg.textContent = 'Something went wrong. Please try again.';
          console.error(err);
        }
      }
    });
  </script>

</body>
</html>
