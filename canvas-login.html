<!-- ===================== canvas-login.html ===================== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Login - InkScout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/logo.png">
</head>
<body>

  <header class="nav fade-down">
    <a href="index.html" class="logo">
      <img src="assets/logo.png" class="logo-img">
      <span>InkScout</span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="browse.html">Explore</a>
      <a href="preregister.html">Sign Up</a>
    </nav>
  </header>

  <section class="form-page fade-up">
    <div class="form-card">

      <div class="form-header">
        <span class="form-icon">🖋</span>
        <h1>Canvas Login</h1>
        <p>Welcome back. Pick up where you left off.</p>
      </div>

      <form class="register-form" id="canvasLoginForm">

        <div class="form-group">
          <label for="canvasEmail">Email Address</label>
          <input type="email" id="canvasEmail" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="canvasPassword">Password</label>
          <input type="password" id="canvasPassword" placeholder="Enter your password" required>
        </div>

        <div class="form-forgot">
          <a href="#" id="forgotLink">Forgot password?</a>
        </div>

        <p class="form-error" id="canvasError"></p>
        <p class="form-success" id="canvasSuccess"></p>

        <button type="submit" class="primary form-submit" id="submitBtn">
          Login as Canvas
        </button>

      </form>

      <p class="form-footer-text">
        Don't have an account? <a href="canvas-register.html">Sign up here</a>
      </p>
      <p class="form-footer-text">
        Logging in as an artist? <a href="artist-login.html">Artist Login</a>
      </p>

    </div>
  </section>

  <footer class="footer fade-in">
    <p>© 2026 InkScout. All rights reserved.</p>
  </footer>

  <script type="module">
    import { auth, db } from './firebase.js';
    import {
      signInWithEmailAndPassword,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const form       = document.getElementById('canvasLoginForm');
    const errorMsg   = document.getElementById('canvasError');
    const successMsg = document.getElementById('canvasSuccess');
    const submitBtn  = document.getElementById('submitBtn');
    const forgotLink = document.getElementById('forgotLink');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errorMsg.textContent   = '';
      successMsg.textContent = '';

      const email    = document.getElementById('canvasEmail').value.trim();
      const password = document.getElementById('canvasPassword').value;

      submitBtn.textContent = 'Logging in...';
      submitBtn.disabled = true;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Verify this is a canvas account
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists() && userDoc.data().role === 'canvas') {
          window.location.href = 'canvas-dashboard.html';
        } else {
          await auth.signOut();
          errorMsg.textContent = 'This account is not a Canvas account. Try Artist Login instead.';
          submitBtn.textContent = 'Login as Canvas';
          submitBtn.disabled = false;
        }

      } catch (err) {
        submitBtn.textContent = 'Login as Canvas';
        submitBtn.disabled = false;

        if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
          errorMsg.textContent = 'Incorrect email or password. Please try again.';
        } else if (err.code === 'auth/too-many-requests') {
          errorMsg.textContent = 'Too many failed attempts. Please wait a moment and try again.';
        } else {
          errorMsg.textContent = 'Something went wrong. Please try again.';
          console.error(err);
        }
      }
    });

    // Forgot password
    forgotLink.addEventListener('click', async function(e) {
      e.preventDefault();
      const email = document.getElementById('canvasEmail').value.trim();
      if (!email) {
        errorMsg.textContent = 'Enter your email address above first.';
        return;
      }
      try {
        await sendPasswordResetEmail(auth, email);
        successMsg.textContent = 'Password reset email sent! Check your inbox.';
        errorMsg.textContent = '';
      } catch (err) {
        errorMsg.textContent = 'Could not send reset email. Check the address and try again.';
      }
    });
  </script>

<script src="nav.js"></script>
</body>
</html>
